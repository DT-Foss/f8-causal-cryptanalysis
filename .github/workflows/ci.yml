name: evidence-integrity

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pinned environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Install native Z3 CLI
        run: |
          python -m pip install z3-solver==4.15.4.0
          z3 -version | grep -F "Z3 version 4.15.4 "
      - name: Test suite
        run: python -m pytest -q
      - name: Primitive vectors
        run: python -m arx_carry_leak verify-vectors
      - name: Compile active Python
        run: python -m compileall -q src research/experiments tests scripts
      - name: Shell syntax
        run: bash -n scripts/*.sh
      - name: Validate causal artifacts
        run: python scripts/validate_causal_artifacts.py
      - name: Verify retained manifests
        run: |
          python scripts/verify_hash_manifest.py \
            provenance/SHA256SUMS \
            research/results/reproduction_v1/SHA256SUMS \
            research/results/v1/ANCHOR_SHA256SUMS \
            research/results/v1/CAUSAL_SHA256SUMS \
            research/results/v1/ATLAS_SHA256SUMS \
            research/results/v1/PQC_SHA256SUMS \
            research/results/v1/FULLROUND_TRANSFER_SHA256SUMS \
            research/results/v1/SHAKE_NATIVE_EXTENDED_SHA256SUMS \
            research/results/v1/SHAKE_SOLVER_FRONTIER_SHA256SUMS \
            research/results/v1/A211_A220P_SHA256SUMS \
            research/results/v1/A220B_A222_INFRA_SHA256SUMS \
            research/results/v1/A223_A277_SHA256SUMS \
            research/results/v1/A278_A286_RECORDS_SHA256SUMS
          python scripts/verify_a326_a456_frontier.py
      - name: Verify deterministic figures
        run: python scripts/generate_publication_figures.py --check
      - name: Publication audit
        run: python scripts/check_publication.py
