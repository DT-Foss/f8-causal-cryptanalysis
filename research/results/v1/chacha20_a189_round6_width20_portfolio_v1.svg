  <text x="993.5" y="270" text-anchor="middle" class="small">no status token</text>
  <text x="993.5" y="290" text-anchor="middle" class="small">parser boundary</text>
  <text x="993.5" y="350" text-anchor="middle" class="small">z3 bitblast b8</text>
  <rect x="1072" y="106" width="139" height="258" rx="8" fill="#f1f3f5" stroke="#8d99a5" stroke-width="2"/>
  <text x="1082" y="135" class="label">boolector</text>
  <text x="1082" y="158" class="small">fun</text>
  <text x="1082" y="181" class="small">blocks = 8</text>
  <text x="1141.5" y="225" text-anchor="middle" class="title" fill="#8d99a5">UNKNOWN</text>
  <text x="1141.5" y="350" text-anchor="middle" class="small">boolector fun b8</text>
  <path d="M 480 390 L 480 414 L 776 414 L 776 390" fill="none" stroke="#238a4b" stroke-width="2"/>
  <text x="628" y="438" text-anchor="middle" class="subtitle">Prospective bitblast b8 prediction retained; preprop b8 independently returns the same assignment.</text>
  <text x="36" y="478" class="small">All eight variants executed without early stop. The predeclared b1 view also returns low20 = 0x6fa70 with an independent 512-bit check.</text>
