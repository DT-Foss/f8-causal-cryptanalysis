  <text x="638" y="135" class="label">bitwuzla</text>
  <text x="638" y="158" class="small">preprop</text>
  <text x="638" y="181" class="small">blocks = 8</text>
  <text x="697.5" y="225" text-anchor="middle" class="title" fill="#238a4b">SAT</text>
  <text x="697.5" y="258" text-anchor="middle" class="value">low20 = 0x6fa70</text>
  <text x="697.5" y="280" text-anchor="middle" class="small">4096/4096 bits</text>
  <text x="697.5" y="300" text-anchor="middle" class="small">control rejected</text>
  <text x="697.5" y="322" text-anchor="middle" class="value">22.287195 s</text>
