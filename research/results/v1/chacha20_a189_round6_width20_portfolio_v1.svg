  <text x="342" y="158" class="small">bitblast</text>
  <text x="342" y="181" class="small">blocks = 4</text>
  <text x="401.5" y="225" text-anchor="middle" class="title" fill="#8d99a5">UNKNOWN</text>
  <text x="401.5" y="350" text-anchor="middle" class="small">bitwuzla bitblast b4</text>
  <rect x="480" y="106" width="139" height="258" rx="8" fill="#dff3e4" stroke="#238a4b" stroke-width="2"/>
  <text x="490" y="135" class="label">bitwuzla</text>
  <text x="490" y="158" class="small">bitblast</text>
  <text x="490" y="181" class="small">blocks = 8</text>
  <text x="549.5" y="225" text-anchor="middle" class="title" fill="#238a4b">SAT</text>
  <text x="549.5" y="258" text-anchor="middle" class="value">low20 = 0x6fa70</text>
  <text x="549.5" y="280" text-anchor="middle" class="small">4096/4096 bits</text>
