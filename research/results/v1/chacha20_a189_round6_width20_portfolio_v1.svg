  <text x="845.5" y="350" text-anchor="middle" class="small">bitwuzla prop b8</text>
  <rect x="924" y="106" width="139" height="258" rx="8" fill="#fff0d5" stroke="#c57c00" stroke-width="2"/>
  <text x="934" y="135" class="label">z3</text>
  <text x="934" y="158" class="small">bitblast</text>
  <text x="934" y="181" class="small">blocks = 8</text>
