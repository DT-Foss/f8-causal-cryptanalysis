<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="510" viewBox="0 0 1240 510" role="img" aria-labelledby="title desc">
  <title id="title">A189 prospective ChaCha6 width-20 solver portfolio</title>
  <desc id="desc">Complete eight-variant portfolio showing the retained b8 prediction, the independent preprop b8 recovery, and the b1 recovery.</desc>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #17202a; }
    .title { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 26px; font-weight: 700; }
    .subtitle { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 15px; fill: #43515d; }
    .label { font-size: 13px; }
    .small { font-size: 11px; fill: #43515d; }
    .value { font-size: 11px; font-weight: 700; }
  </style>
  <text x="36" y="43" class="title">A189 — prospective round-6 width-20 transfer</text>
  <text x="36" y="70" class="subtitle">Fresh reduced ChaCha6 · 20 unknown key bits · 236 known key bits · eight counter-related blocks</text>
  <rect x="36" y="106" width="139" height="258" rx="8" fill="#dff3e4" stroke="#238a4b" stroke-width="2"/>
  <text x="46" y="135" class="label">bitwuzla</text>
  <text x="46" y="158" class="small">bitblast</text>
  <text x="46" y="181" class="small">blocks = 1</text>
  <text x="105.5" y="225" text-anchor="middle" class="title" fill="#238a4b">SAT</text>
  <text x="105.5" y="258" text-anchor="middle" class="value">low20 = 0x6fa70</text>
  <text x="105.5" y="280" text-anchor="middle" class="small">512/512 bits</text>
  <text x="105.5" y="300" text-anchor="middle" class="small">control rejected</text>
  <text x="105.5" y="322" text-anchor="middle" class="value">3.044800 s</text>
  <text x="105.5" y="342" text-anchor="middle" class="small">b1 boundary</text>
  <rect x="184" y="106" width="139" height="258" rx="8" fill="#f1f3f5" stroke="#8d99a5" stroke-width="2"/>
  <text x="194" y="135" class="label">bitwuzla</text>
  <text x="194" y="158" class="small">bitblast</text>
  <text x="194" y="181" class="small">blocks = 2</text>
