  <text x="401.5" y="225" text-anchor="middle" class="title" fill="#8d99a5">UNKNOWN</text>
  <text x="401.5" y="276" text-anchor="middle" class="small">predeclared</text>
  <text x="401.5" y="296" text-anchor="middle" class="small">prediction view</text>
  <text x="401.5" y="350" text-anchor="middle" class="small">bitwuzla bitblast b4</text>
