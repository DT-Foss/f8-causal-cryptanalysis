<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="550" viewBox="0 0 1240 550" role="img" aria-labelledby="title desc">
  <title id="title">A191 assignment-free complete ChaCha7 width-18 partition</title>
  <desc id="desc">All eight disjoint 15-bit prefix cells covering the original 18-bit domain, with seven UNSAT cells and one independently confirmed SAT cell.</desc>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #17202a; }
    .title { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 26px; font-weight: 700; }
    .subtitle { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 15px; fill: #43515d; }
    .label { font-size: 13px; }
    .small { font-size: 11px; fill: #43515d; }
    .value { font-size: 11px; font-weight: 700; }
  </style>
  <text x="36" y="43" class="title">A191 — assignment-free complete round-7 partition</text>
  <text x="36" y="70" class="subtitle">Fresh reduced ChaCha7 · unchanged 2¹⁸ candidate domain · eight disjoint 2¹⁵ cells · fixed numeric order</text>
  <rect x="36" y="106" width="139" height="270" rx="8" fill="#eaf1f8" stroke="#356c9b" stroke-width="2"/>
  <text x="105.5" y="139" text-anchor="middle" class="label">prefix 000</text>
  <text x="105.5" y="166" text-anchor="middle" class="small">bits 17…15 fixed</text>
  <text x="105.5" y="188" text-anchor="middle" class="small">2¹⁵ candidates</text>
  <text x="105.5" y="238" text-anchor="middle" class="title" fill="#356c9b">UNSAT</text>
  <text x="105.5" y="286" text-anchor="middle" class="small">cell closed</text>
  <text x="105.5" y="308" text-anchor="middle" class="small">no model</text>
  <text x="105.5" y="350" text-anchor="middle" class="small">prefix 000</text>
  <rect x="184" y="106" width="139" height="270" rx="8" fill="#eaf1f8" stroke="#356c9b" stroke-width="2"/>
  <text x="253.5" y="139" text-anchor="middle" class="label">prefix 001</text>
  <text x="253.5" y="166" text-anchor="middle" class="small">bits 17…15 fixed</text>
  <text x="253.5" y="188" text-anchor="middle" class="small">2¹⁵ candidates</text>
  <text x="253.5" y="238" text-anchor="middle" class="title" fill="#356c9b">UNSAT</text>
  <text x="253.5" y="286" text-anchor="middle" class="small">cell closed</text>
  <text x="253.5" y="308" text-anchor="middle" class="small">no model</text>
  <text x="253.5" y="350" text-anchor="middle" class="small">prefix 001</text>
  <rect x="332" y="106" width="139" height="270" rx="8" fill="#eaf1f8" stroke="#356c9b" stroke-width="2"/>
  <text x="401.5" y="139" text-anchor="middle" class="label">prefix 010</text>
  <text x="401.5" y="166" text-anchor="middle" class="small">bits 17…15 fixed</text>
  <text x="401.5" y="188" text-anchor="middle" class="small">2¹⁵ candidates</text>
  <text x="401.5" y="238" text-anchor="middle" class="title" fill="#356c9b">UNSAT</text>
  <text x="401.5" y="286" text-anchor="middle" class="small">cell closed</text>
  <text x="401.5" y="308" text-anchor="middle" class="small">no model</text>
  <text x="401.5" y="350" text-anchor="middle" class="small">prefix 010</text>
  <rect x="480" y="106" width="139" height="270" rx="8" fill="#eaf1f8" stroke="#356c9b" stroke-width="2"/>
  <text x="549.5" y="139" text-anchor="middle" class="label">prefix 011</text>
  <text x="549.5" y="166" text-anchor="middle" class="small">bits 17…15 fixed</text>
  <text x="549.5" y="188" text-anchor="middle" class="small">2¹⁵ candidates</text>
  <text x="549.5" y="238" text-anchor="middle" class="title" fill="#356c9b">UNSAT</text>
  <text x="549.5" y="286" text-anchor="middle" class="small">cell closed</text>
  <text x="549.5" y="308" text-anchor="middle" class="small">no model</text>
  <text x="549.5" y="350" text-anchor="middle" class="small">prefix 011</text>
  <rect x="628" y="106" width="139" height="270" rx="8" fill="#eaf1f8" stroke="#356c9b" stroke-width="2"/>
  <text x="697.5" y="139" text-anchor="middle" class="label">prefix 100</text>
  <text x="697.5" y="166" text-anchor="middle" class="small">bits 17…15 fixed</text>
  <text x="697.5" y="188" text-anchor="middle" class="small">2¹⁵ candidates</text>
  <text x="697.5" y="238" text-anchor="middle" class="title" fill="#356c9b">UNSAT</text>
  <text x="697.5" y="286" text-anchor="middle" class="small">cell closed</text>
  <text x="697.5" y="308" text-anchor="middle" class="small">no model</text>
  <text x="697.5" y="350" text-anchor="middle" class="small">prefix 100</text>
  <rect x="776" y="106" width="139" height="270" rx="8" fill="#eaf1f8" stroke="#356c9b" stroke-width="2"/>
  <text x="845.5" y="139" text-anchor="middle" class="label">prefix 101</text>
  <text x="845.5" y="166" text-anchor="middle" class="small">bits 17…15 fixed</text>
  <text x="845.5" y="188" text-anchor="middle" class="small">2¹⁵ candidates</text>
  <text x="845.5" y="238" text-anchor="middle" class="title" fill="#356c9b">UNSAT</text>
  <text x="845.5" y="286" text-anchor="middle" class="small">cell closed</text>
  <text x="845.5" y="308" text-anchor="middle" class="small">no model</text>
  <text x="845.5" y="350" text-anchor="middle" class="small">prefix 101</text>
  <rect x="924" y="106" width="139" height="270" rx="8" fill="#eaf1f8" stroke="#356c9b" stroke-width="2"/>
  <text x="993.5" y="139" text-anchor="middle" class="label">prefix 110</text>
  <text x="993.5" y="166" text-anchor="middle" class="small">bits 17…15 fixed</text>
  <text x="993.5" y="188" text-anchor="middle" class="small">2¹⁵ candidates</text>
  <text x="993.5" y="238" text-anchor="middle" class="title" fill="#356c9b">UNSAT</text>
  <text x="993.5" y="286" text-anchor="middle" class="small">cell closed</text>
  <text x="993.5" y="308" text-anchor="middle" class="small">no model</text>
  <text x="993.5" y="350" text-anchor="middle" class="small">prefix 110</text>
  <rect x="1072" y="106" width="139" height="270" rx="8" fill="#dff3e4" stroke="#238a4b" stroke-width="2"/>
  <text x="1141.5" y="139" text-anchor="middle" class="label">prefix 111</text>
  <text x="1141.5" y="166" text-anchor="middle" class="small">bits 17…15 fixed</text>
  <text x="1141.5" y="188" text-anchor="middle" class="small">2¹⁵ candidates</text>
  <text x="1141.5" y="238" text-anchor="middle" class="title" fill="#238a4b">SAT</text>
  <text x="1141.5" y="274" text-anchor="middle" class="value">low18 = 0x3d051</text>
  <text x="1141.5" y="298" text-anchor="middle" class="small">512/512 bits</text>
  <text x="1141.5" y="320" text-anchor="middle" class="small">control rejected</text>
  <text x="1141.5" y="350" text-anchor="middle" class="small">prefix 111</text>
  <path d="M 36 402 L 36 430 L 1211 430 L 1211 402" fill="none" stroke="#17202a" stroke-width="2"/>
  <text x="623.5" y="458" text-anchor="middle" class="subtitle">8 × 2¹⁵ = 2¹⁸: pairwise-disjoint union equals the complete original domain.</text>
  <text x="36" y="496" class="small">All cells executed in frozen order with no early stop. Prefixes 000–110 are UNSAT; prefix 111 returns the independently confirmed assignment.</text>
  <text x="36" y="522" class="small">The partition changes representation only; it does not shrink the candidate domain.</text>
</svg>
